default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: github_ingestor_development
  url: <%= ENV.fetch("DATABASE_URL", "postgresql://postgres:postgres@localhost:5432/github_ingestor_development") %>

test:
  <<: *default
  database: github_ingestor_test
  url: <%= ENV.fetch("DATABASE_URL", "postgresql://postgres:postgres@localhost:5432/github_ingestor_test") %>

production:
  <<: *default
  database: github_ingestor_production
  url: <%= ENV["DATABASE_URL"] %>
