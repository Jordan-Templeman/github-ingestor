version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: github_ingestor_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  app:
    build: .
    command: bundle exec rails server -b 0.0.0.0 -p 3000
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/github_ingestor_development
    depends_on:
      db:
        condition: service_healthy

  ingest:
    build: .
    command: bundle exec rails runner "IngestionService.run"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@db:5432/github_ingestor_development
    depends_on:
      db:
        condition: service_healthy

  test:
    build:
      context: .
      target: build
    command: bash -c "bundle config set --local without '' && bundle install && bundle exec rspec --format documentation"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    environment:
      RAILS_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@db:5432/github_ingestor_test
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  bundle_cache:
